<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — RoadLine</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ===================== NAVBAR ===================== -->
<nav class="navbar navbar-expand-lg rl-navbar">
  <div class="container">
    <a class="navbar-brand" href="index.html">Road<span class="brand-dot">Line</span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
        <li class="nav-item ms-lg-2"><a class="nav-link btn-register-nav" href="register.html">Register</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- ===================== LOGIN ===================== -->
<div class="auth-wrap">
  <div class="container">
    <div class="auth-card">
      <div class="ticket-code">Boarding Pass · Member Login</div>
      <h2>Welcome back.</h2>
      <p class="subtitle">Log in to manage your bookings and track your bus.</p>

      <div id="loginAlert" class="alert d-none" role="alert"></div>

      <form id="loginForm" novalidate>
        <div class="form-floating mb-3">
          <input type="email" class="form-control" id="loginEmail" placeholder="name@example.com" required>
          <label for="loginEmail">Email address</label>
          <div class="invalid-feedback">Please enter a valid email address.</div>
        </div>

        <div class="form-floating mb-2 position-relative">
          <input type="password" class="form-control" id="loginPassword" placeholder="Password" minlength="6" required>
          <label for="loginPassword">Password</label>
          <button type="button" id="toggleLoginPw" class="btn btn-sm position-absolute" style="right:8px; top:8px; z-index:5; background:transparent;" aria-label="Show password">
            <i class="bi bi-eye"></i>
          </button>
          <div class="invalid-feedback">Password must be at least 6 characters.</div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rememberMe">
            <label class="form-check-label text-secondary" for="rememberMe" style="font-size:0.9rem;">Remember me</label>
          </div>
          <a href="#" style="font-size:0.9rem; color:var(--amber-dark); font-weight:600;">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-amber w-100 py-2">Log In</button>
      </form>

      <div class="divider-or">or continue with</div>
      <div class="social-row">
        <button class="btn"><i class="bi bi-google me-1"></i> Google</button>
        <button class="btn"><i class="bi bi-facebook me-1"></i> Facebook</button>
      </div>

      <p class="text-center text-secondary mt-4 mb-0">
        New to RoadLine? <a href="register.html" style="color:var(--amber-dark); font-weight:700;">Create an account</a>
      </p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>
